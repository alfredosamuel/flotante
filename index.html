<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagen/Web Always On Top (web directa)</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --surface2: #0f3460;
            --accent: #e94560;
            --accent2: #0ea5e9;
            --accent3: #8b5cf6;
            --text: #e0e0e0;
            --text2: #a0a0b8;
            --border: #2a2a4a;
            --radius: 16px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image:
                radial-gradient(ellipse at 30% 20%, rgba(233, 68, 96, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 60%, rgba(14, 165, 233, 0.06) 0%, transparent 60%);
        }

        .container { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 20px; }

        .header {
            text-align: center; display: flex; align-items: center; justify-content: center;
            gap: 12px; flex-wrap: wrap;
        }
        .header .icon {
            width: 44px; height: 44px; border-radius: 14px;
            background: linear-gradient(135deg, var(--accent), var(--accent3));
            display: flex; align-items: center; justify-content: center; font-size: 22px;
            box-shadow: 0 4px 15px rgba(233,68,96,0.35);
        }
        .header h1 { font-size: 1.6rem; font-weight: 700; }
        .header span { color: var(--accent); }
        .badge {
            font-size: 0.7rem; background: var(--accent2); color: #fff;
            padding: 4px 10px; border-radius: 20px; font-weight: 600;
        }

        .section-title { font-size: 0.9rem; font-weight: 600; color: var(--text2); margin-bottom: 10px; }

        .drop-zone {
            background: var(--surface); border: 2.5px dashed var(--border);
            border-radius: var(--radius); padding: 36px 20px; text-align: center;
            cursor: pointer; transition: all 0.3s; min-height: 180px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
        }
        .drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent2); background: var(--surface2); }
        .drop-zone.drag-over { border-color: #22c55e; background: rgba(34,197,94,0.08); }
        .drop-icon { font-size: 42px; opacity: 0.7; pointer-events: none; }
        .drop-text { font-size: 0.95rem; color: var(--text2); line-height: 1.5; }
        .drop-hint { font-size: 0.8rem; color: var(--text2); opacity: 0.6; }

        .url-input-group {
            display: flex; gap: 10px; background: var(--surface);
            border-radius: var(--radius); padding: 12px 16px; box-shadow: var(--shadow);
            border: 1px solid var(--border); flex-wrap: wrap;
        }
        .url-input-group input {
            flex: 1; min-width: 200px; padding: 10px 14px; border-radius: 10px;
            border: 1px solid var(--border); background: var(--surface2); color: var(--text);
            font-family: inherit; font-size: 0.9rem; outline: none;
        }
        .url-input-group button { white-space: nowrap; }

        .preview-area { display: none; background: var(--surface); border-radius: var(--radius); padding: 16px; }
        .preview-area.visible { display: block; }
        .preview-img-wrap {
            width: 100%; max-height: 220px; overflow: hidden; border-radius: 10px;
            background: #000; display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: 1px solid var(--border);
        }
        .preview-img-wrap img { max-width: 100%; max-height: 220px; object-fit: contain; }

        .btn {
            padding: 10px 18px; border-radius: 10px; border: none; cursor: pointer;
            font-weight: 600; font-size: 0.9rem; transition: 0.2s; display: flex;
            align-items: center; gap: 7px; white-space: nowrap;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-accent { background: var(--accent3); color: #fff; }
        .btn-outline { background: transparent; color: var(--text2); border: 1px solid var(--border); }
        .btn-danger { background: transparent; color: #f87171; border: 1px solid #f8717133; }
        .btn:disabled { opacity: 0.45; pointer-events: none; }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: #333; color: #fff; padding: 12px 24px; border-radius: 30px;
            font-weight: 600; z-index: 9999; transition: 0.3s; pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { background: #dc2626; }

        #fileInput { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="icon">🖼️</div>
        <h1>Always <span>On Top</span></h1>
        <span class="badge">imagen + web</span>
    </div>

    <div class="section-title">🖼️ Cargar imagen</div>
    <div class="drop-zone" id="dropZone">
        <div class="drop-icon">📥</div>
        <div class="drop-text"><strong>Arrastra y suelta</strong> o <strong>Ctrl+V</strong></div>
        <div class="drop-hint">También puedes hacer clic para seleccionar archivo</div>
    </div>
    <input type="file" id="fileInput" accept="image/*">

    <div class="preview-area" id="previewArea">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <span>✅ Imagen cargada</span>
            <div style="display:flex; gap:6px;">
                <button class="btn btn-outline btn-sm" id="btnChange">🔄 Cambiar</button>
                <button class="btn btn-danger btn-sm" id="btnClear">✕ Quitar</button>
            </div>
        </div>
        <div class="preview-img-wrap" id="previewImgWrap">
            <img id="previewImg" src="" alt="Preview">
        </div>
    </div>

    <div class="section-title">🌐 Abrir página web (carga directa, sin iframes)</div>
    <div class="url-input-group">
        <input type="text" id="urlInput" placeholder="https://es.wikipedia.org">
        <button class="btn btn-accent" id="btnOpenUrl">📌 Abrir web flotante</button>
    </div>

    <button class="btn btn-primary" id="btnOpenPip" disabled style="justify-content:center;">
        📌 Abrir ventana flotante (imagen actual)
    </button>

    <div style="display:flex; align-items:center; justify-content:center; gap:10px; font-size:0.8rem; color:var(--text2);">
        <span id="pipStatus">Sin ventana flotante</span>
        <button class="btn btn-outline btn-sm" id="btnClosePip" style="display:none;">❌ Cerrar ventana</button>
    </div>

    <div class="toast" id="toast"></div>
</div>

<script>
(function() {
    // Elementos
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const previewArea = document.getElementById('previewArea');
    const previewImg = document.getElementById('previewImg');
    const previewImgWrap = document.getElementById('previewImgWrap');
    const btnOpenPip = document.getElementById('btnOpenPip');
    const btnChange = document.getElementById('btnChange');
    const btnClear = document.getElementById('btnClear');
    const btnClosePip = document.getElementById('btnClosePip');
    const pipStatus = document.getElementById('pipStatus');
    const toast = document.getElementById('toast');
    const urlInput = document.getElementById('urlInput');
    const btnOpenUrl = document.getElementById('btnOpenUrl');

    let currentImageBlob = null;
    let currentImageUrl = null;
    let pipImageUrl = null;
    let pipWindow = null;
    let pipMode = 'image';
    let toastTimer = null;

    const supportsPip = ('documentPictureInPicture' in window);

    function showToast(msg, isError = false) {
        if (toastTimer) clearTimeout(toastTimer);
        toast.textContent = msg;
        toast.className = 'toast ' + (isError ? 'error' : '');
        void toast.offsetWidth;
        toast.classList.add('show');
        toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
    }

    function updateUI() {
        const hasImage = !!currentImageBlob;
        previewArea.classList.toggle('visible', hasImage);
        btnOpenPip.disabled = !hasImage;
        btnClosePip.style.display = pipWindow ? 'inline-flex' : 'none';
        if (pipWindow) {
            pipStatus.textContent = `✅ Ventana activa (${pipMode})`;
        } else {
            pipStatus.textContent = hasImage ? 'Imagen lista' : 'Sin contenido';
        }
    }

    // Cargar imagen desde blob
    function loadImageFromBlob(blob) {
        if (currentImageUrl) URL.revokeObjectURL(currentImageUrl);
        if (pipImageUrl) URL.revokeObjectURL(pipImageUrl);
        currentImageBlob = blob;
        currentImageUrl = URL.createObjectURL(blob);
        pipImageUrl = URL.createObjectURL(blob);
        previewImg.src = currentImageUrl;
        updateUI();
        if (pipWindow && pipMode === 'image') {
            try { pipWindow.postMessage({ type: 'updateImage', url: pipImageUrl }, '*'); } catch(e) {}
        }
        showToast('✅ Imagen cargada');
    }

    function loadImageFromFile(file) {
        if (!file || !file.type.startsWith('image/')) {
            showToast('⚠️ Archivo no válido', true);
            return;
        }
        loadImageFromBlob(file);
    }

    async function loadImageFromUrl(url) {
        showToast('⏳ Cargando imagen...');
        try {
            const resp = await fetch(url, { mode: 'cors' });
            if (!resp.ok) throw new Error('Respuesta no válida');
            const blob = await resp.blob();
            if (!blob.type.startsWith('image/')) throw new Error('No es imagen');
            loadImageFromBlob(blob);
        } catch (e) {
            console.warn('Fetch falló, intentando método canvas', e);
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => {
                try {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.naturalWidth;
                    canvas.height = img.naturalHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    canvas.toBlob(blob => {
                        if (blob) loadImageFromBlob(blob);
                        else showToast('⚠️ No se pudo procesar la imagen', true);
                    }, 'image/png');
                } catch (canvasErr) {
                    console.error(canvasErr);
                    showToast('⚠️ Error de seguridad al cargar la imagen (posible CORS)', true);
                }
            };
            img.onerror = () => showToast('⚠️ No se pudo cargar la imagen', true);
            img.src = url;
        }
    }

    // Abrir ventana PiP o popup
    async function openPipWindow(mode, url = null) {
        if (!supportsPip) {
            openPopupFallback(mode, url);
            return;
        }
        try {
            if (pipWindow) {
                pipWindow.close();
                await new Promise(r => setTimeout(r, 300));
            }
            const win = await documentPictureInPicture.requestWindow({
                width: mode === 'web' ? 800 : 500,
                height: mode === 'web' ? 600 : 450,
            });
            pipWindow = win;
            pipMode = mode;

            if (mode === 'image') {
                const html = generateImagePipHTML();
                win.document.open();
                win.document.write(html);
                win.document.close();
            } else if (mode === 'web') {
                // Cargar directamente la URL en la ventana
                win.location.href = url;
            }

            win.addEventListener('pagehide', () => {
                pipWindow = null;
                updateUI();
                showToast('📋 Ventana cerrada');
            });
            updateUI();
            showToast(`🚀 Ventana flotante abierta (${mode === 'web' ? 'web' : 'imagen'})`);
        } catch (err) {
            console.error('Error al abrir PiP:', err);
            showToast('⚠️ Falló PiP, intentando popup...', true);
            openPopupFallback(mode, url);
        }
    }

    function openPopupFallback(mode, url = null) {
        if (pipWindow) try { pipWindow.close(); } catch(e) {}
        const w = mode === 'web' ? 800 : 500;
        const h = mode === 'web' ? 600 : 450;
        const left = (screen.width - w) / 2;
        const top = (screen.height - h) / 2;
        let popup;
        if (mode === 'web') {
            popup = window.open(url, 'flotante', `width=${w},height=${h},left=${left},top=${top},resizable=yes`);
        } else {
            popup = window.open('', 'flotante', `width=${w},height=${h},left=${left},top=${top},resizable=yes`);
            if (popup) {
                const html = generateImagePipHTML();
                popup.document.open();
                popup.document.write(html);
                popup.document.close();
            }
        }
        if (!popup) {
            showToast('⚠️ Popup bloqueado. Permite ventanas emergentes.', true);
            return;
        }
        pipWindow = popup;
        pipMode = mode;
        const check = setInterval(() => {
            if (popup.closed) {
                clearInterval(check);
                pipWindow = null;
                updateUI();
                showToast('📋 Ventana cerrada');
            }
        }, 500);
        updateUI();
        showToast('⚠️ Modo popup (no siempre encima). Usa Chrome 116+ para PiP real.');
    }

    // Generar solo el HTML para imagen (ya no necesitamos el modo web en HTML)
    function generateImagePipHTML() {
        const imgSrc = pipImageUrl || '';
        return `<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imagen flotante</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',system-ui;background:#1a1a1a}
.bg-checker{
  position:absolute;inset:0;z-index:0;
  background-image:linear-gradient(45deg,#333 25%,transparent 25%),linear-gradient(-45deg,#333 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#333 75%),linear-gradient(-45deg,transparent 75%,#333 75%);
  background-size:24px 24px;background-position:0 0,0 12px,12px -12px,-12px 0;opacity:0.5
}
.main-container{position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column}
.image-area{flex:1;overflow:hidden;cursor:grab;position:relative;display:flex;align-items:center;justify-content:center}
#pipImage{display:block;transform-origin:center;pointer-events:none;max-width:none;max-height:none}
.controls{display:flex;align-items:center;gap:6px;padding:8px;background:rgba(30,30,40,0.95);border-top:1px solid rgba(255,255,255,0.08);flex-wrap:wrap;justify-content:center}
.ctrl-btn{width:32px;height:32px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:#ddd;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:0.2s}
.ctrl-btn:hover{background:rgba(255,255,255,0.15);color:#fff}
.zoom-label{font-size:11px;color:#aaa;min-width:40px;text-align:center}
#opacitySlider{width:70px;accent-color:#e94560}
.close-btn{background:rgba(233,68,96,0.2);border-color:rgba(233,68,96,0.4);color:#f87171;font-weight:bold}
</style>
</head>
<body>
<div class="bg-checker"></div>
<div class="main-container">
  <div class="image-area" id="imageArea">
    <img id="pipImage" src="${imgSrc}" draggable="false">
  </div>
  <div class="controls">
    <button class="ctrl-btn" id="btnZoomOut">−</button>
    <span class="zoom-label" id="zoomLabel">100%</span>
    <button class="ctrl-btn" id="btnZoomIn">+</button>
    <button class="ctrl-btn" id="btnFit" style="width:auto;padding:0 8px;font-size:12px;">⊞ Ajustar</button>
    <span style="width:1px;height:20px;background:rgba(255,255,255,0.1);margin:0 4px;"></span>
    <span style="font-size:10px;color:#999;">Opac.</span>
    <input type="range" id="opacitySlider" min="10" max="100" value="100">
    <span style="width:1px;height:20px;background:rgba(255,255,255,0.1);margin:0 4px;"></span>
    <button class="ctrl-btn close-btn" id="btnCloseImage">✕</button>
  </div>
</div>
<script>
  const img = document.getElementById('pipImage');
  const imageArea = document.getElementById('imageArea');
  const zoomLabel = document.getElementById('zoomLabel');
  const opacitySlider = document.getElementById('opacitySlider');
  let scale = 1, tx = 0, ty = 0, dragging = false, startX, startY, startTx, startTy;
  function applyTransform() {
    if (!img) return;
    img.style.transform = \`translate(\${tx}px,\${ty}px) scale(\${scale})\`;
    if (zoomLabel) zoomLabel.textContent = Math.round(scale * 100) + '%';
  }
  function fitToWindow() {
    if (!img || !imageArea) return;
    const aw = imageArea.clientWidth, ah = imageArea.clientHeight;
    const iw = img.naturalWidth || img.width, ih = img.naturalHeight || img.height;
    if (iw && ih) {
      scale = Math.min((aw*0.9)/iw, (ah*0.9)/ih, 1);
      tx = ty = 0;
      applyTransform();
    }
  }
  if (img) {
    img.addEventListener('load', fitToWindow);
    if (img.complete && img.naturalWidth) fitToWindow();
  }
  if (imageArea) {
    imageArea.addEventListener('mousedown', e => {
      if (e.target === img || e.target === imageArea) {
        dragging = true; startX = e.clientX; startY = e.clientY; startTx = tx; startTy = ty;
        e.preventDefault();
      }
    });
    window.addEventListener('mousemove', e => {
      if (!dragging) return;
      tx = startTx + (e.clientX - startX); ty = startTy + (e.clientY - startY);
      applyTransform();
    });
    window.addEventListener('mouseup', () => { dragging = false; });
    imageArea.addEventListener('wheel', e => {
      e.preventDefault();
      const rect = imageArea.getBoundingClientRect();
      const mx = e.clientX - rect.left - rect.width/2, my = e.clientY - rect.top - rect.height/2;
      const factor = e.deltaY < 0 ? 1.1 : 0.9;
      const newScale = Math.min(Math.max(scale * factor, 0.1), 10);
      const change = newScale / scale;
      tx = mx - change * (mx - tx); ty = my - change * (my - ty);
      scale = newScale;
      applyTransform();
    }, {passive:false});
    imageArea.addEventListener('dblclick', fitToWindow);
  }
  document.getElementById('btnZoomIn')?.addEventListener('click', () => { scale = Math.min(scale*1.25,10); applyTransform(); });
  document.getElementById('btnZoomOut')?.addEventListener('click', () => { scale = Math.max(scale/1.25,0.1); applyTransform(); });
  document.getElementById('btnFit')?.addEventListener('click', fitToWindow);
  opacitySlider?.addEventListener('input', e => { if(img) img.style.opacity = e.target.value/100; });
  document.getElementById('btnCloseImage')?.addEventListener('click', () => window.close());
  window.addEventListener('keydown', e => { if (e.key === 'Escape') window.close(); });
  window.addEventListener('message', e => {
    if (e.data?.type === 'updateImage' && img) {
      img.src = e.data.url; scale=1; tx=ty=0; applyTransform();
    }
  });
<\/script>
</body>
</html>`;
    }

    function closePipWindow() {
        if (pipWindow) {
            try { pipWindow.close(); } catch(e) {}
            pipWindow = null;
            updateUI();
        }
    }

    function handleTextInput(text) {
        text = text.trim();
        if (!text) return;
        if (/^https?:\/\/.+\.(jpg|jpeg|png|gif|webp|svg|bmp)(\?.*)?$/i.test(text)) {
            loadImageFromUrl(text);
        } else if (/^https?:\/\//i.test(text)) {
            urlInput.value = text;
            showToast('🔗 URL lista. Pulsa "Abrir web flotante"');
        }
    }

    // Event listeners
    dropZone.addEventListener('click', () => fileInput.click());
    previewImgWrap.addEventListener('click', () => {
        if (currentImageBlob && !pipWindow) openPipWindow('image');
        else if (pipWindow && pipMode === 'image') try { pipWindow.focus(); } catch(e) {}
    });
    fileInput.addEventListener('change', e => {
        if (e.target.files[0]) loadImageFromFile(e.target.files[0]);
        fileInput.value = '';
    });

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', e => { dropZone.classList.remove('drag-over'); });
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        if (e.dataTransfer.files.length) {
            loadImageFromFile(e.dataTransfer.files[0]);
        } else {
            handleTextInput(e.dataTransfer.getData('text/plain'));
        }
    });

    document.addEventListener('paste', e => {
        const active = document.activeElement;
        if (active && active !== document.body && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.isContentEditable)) return;
        const items = e.clipboardData.items;
        for (const item of items) {
            if (item.type.startsWith('image/')) {
                e.preventDefault();
                loadImageFromBlob(item.getAsFile());
                return;
            }
        }
        handleTextInput(e.clipboardData.getData('text/plain'));
    });

    btnOpenPip.addEventListener('click', () => {
        if (currentImageBlob) openPipWindow('image');
    });
    btnChange.addEventListener('click', (e) => { e.stopPropagation(); fileInput.click(); });
    btnClear.addEventListener('click', (e) => {
        e.stopPropagation();
        closePipWindow();
        if (currentImageUrl) URL.revokeObjectURL(currentImageUrl);
        if (pipImageUrl) URL.revokeObjectURL(pipImageUrl);
        currentImageBlob = null; currentImageUrl = null; pipImageUrl = null;
        previewImg.src = '';
        updateUI();
        showToast('🗑️ Imagen eliminada');
    });
    btnClosePip.addEventListener('click', closePipWindow);
    document.addEventListener('keydown', e => { if (e.key === 'Escape' && pipWindow) closePipWindow(); });
    window.addEventListener('beforeunload', () => {
        if (pipWindow) try { pipWindow.close(); } catch(e) {}
        if (currentImageUrl) URL.revokeObjectURL(currentImageUrl);
        if (pipImageUrl) URL.revokeObjectURL(pipImageUrl);
    });

    btnOpenUrl.addEventListener('click', () => {
        const url = urlInput.value.trim();
        if (!url) { showToast('⚠️ Escribe una URL', true); return; }
        if (!/^https?:\/\//i.test(url)) {
            showToast('⚠️ La URL debe empezar con http:// o https://', true);
            return;
        }
        openPipWindow('web', url);
    });
    urlInput.addEventListener('keypress', e => { if (e.key === 'Enter') btnOpenUrl.click(); });

    updateUI();
    console.log('✅ Aplicación lista. Modo web: carga directa de página, sin iframes.');
})();
</script>
</body>
</html>
